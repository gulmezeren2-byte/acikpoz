name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --dev --extra mcp
      - name: Test
        run: uv run pytest -q
      - name: Lint
        run: uv run ruff check src tests
      - name: Types
        run: uv run mypy src
